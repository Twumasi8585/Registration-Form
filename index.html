<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Systems</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Register Icon.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="main">
            <h2>Online Registration System</h2>
           
           <div class="content">
             <form action="">
                 <div class="form">
                  <input type="text" required>
                  <label>Name</label>
                </div>

                <div class="form">
                    <input type="text" required>
                    <label>Email</label>
                </div>

                <div class="form">
                    <input type="password" required>
                    <label>Password</label>
                    <i class="fa-solid fa-eye"></i>
                    <i class="fa-solid fa-eye-slash hide"></i>

                    
                </div>
                  
                <div class="content1">
                   <p><a href="">Forgot Password? </a>Click Here</p>
                </div>


                 <div class="Sub-Button">
                        <button type="button">Submit</button>

                 </div>

                 <!---<div class="btnbutton">
                        <button type="button" id="signupBtn">Sign Up</button>
                        <button type="button" id="signinBtn" class="Disable">Sign In</button>
                </div>------> 
                
            
            </form>
               
           
            </div>
        
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
